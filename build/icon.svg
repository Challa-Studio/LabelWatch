<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background Squircle (rx=230 for Apple standard continuous corner approximation) -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)" />
  
  <!-- Clock Face Group -->
  <g filter="url(#shadow)">
    <!-- Outer Clock Ring -->
    <circle cx="512" cy="512" r="340" fill="none" stroke="url(#blue)" stroke-width="40"/>
    
    <!-- Clock Dots -->
    <circle cx="512" cy="240" r="24" fill="#38bdf8"/>
    <circle cx="512" cy="784" r="24" fill="#38bdf8"/>
    <circle cx="240" cy="512" r="24" fill="#38bdf8"/>
    <circle cx="784" cy="512" r="24" fill="#38bdf8"/>
    <circle cx="320" cy="320" r="16" fill="#64748b"/>
    <circle cx="704" cy="320" r="16" fill="#64748b"/>
    <circle cx="320" cy="704" r="16" fill="#64748b"/>
    <circle cx="704" cy="704" r="16" fill="#64748b"/>
    
    <!-- Clock Hands -->
    <line x1="512" y1="512" x2="512" y2="280" stroke="white" stroke-width="36" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="720" y2="512" stroke="white" stroke-width="36" stroke-linecap="round"/>
    <line x1="512" y1="512" x2="350" y2="700" stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Center Dot -->
    <circle cx="512" cy="512" r="32" fill="white" stroke="#38bdf8" stroke-width="16"/>
  </g>
</svg>
